name: cart CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'cart/**'
      # any pushes to any, matches anything within cart recursively
  pull_request:
    branches: ["main"]
    paths:
      - 'cart/**'
      # any pull requests to main, matches anything within cart recursively

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
    - name: Debug Info
      run: |
        pwd
        ls -la
    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PA_TOKEN }}
        
    - name: Build and Test Cart Service
      # -pl cart: Only build cart project
      # -am: Also make dependencies (build common-library if needed)
      run: mvn -B clean install -pl cart -am # switching to system maven
      
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cart-test-results-and-coverage
        path: | 
          cart/target/*-reports/*.xml
          cart/target/site/jacoco/*

    - name: enforce minimum coverage and PR comment
      id: jacoco
      uses: madrapps/jacoco-report@v1.7.2
      with:
        paths: |
          ${{ github.workspace }}/cart/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 70
        title: "cart coverage"

    - name: Fail PR if overall coverage is less than 70%
      if: ${{ steps.jacoco.outputs.coverage-overall < 70.0 }}
      uses: actions/github-script@v6
      with:
        script: |
          core.setFailed('Overall coverage is less than 70%!')
              
    - name: add jacoco coverage to job summary
      run: |
        echo "### Code Coverage Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Overall Coverage:** ${{ steps.jacoco.outputs.coverage-overall }}%" >> $GITHUB_STEP_SUMMARY
        echo "- **Changed Files Coverage:** ${{ steps.jacoco.outputs.coverage-changed-files }}%" >> $GITHUB_STEP_SUMMARY

    - name: publish test results
      uses: mikepenz/action-junit-report@v4
      if: success() || failure()
      with:
        report_paths: cart/target/*-reports/TEST-*.xml
        detailed_summary: true
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache OWASP NVD DB
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: owasp-nvd-${{ runner.os }}

    - name: Checkstyle
      run: mvn checkstyle:check -pl cart -am

    - name: OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -pl cart -am

    - name: Upload OWASP Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cart-owasp-report
        path: cart/target/dependency-check-report.html