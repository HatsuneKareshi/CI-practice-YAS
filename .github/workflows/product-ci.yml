name: product service CI

on:
  workflow_dispatch:
  push:
    paths:
      - 'product/**'
      # any pushes to any, matches anything within product recursively
  pull_request:
    branches: [ "main" ]
    paths:
      - 'product/**'
      # any pull requests to main, matches anything within product recursively

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        
        distribution: 'temurin'
        cache: 'maven'

    - name: login to docker hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PA_TOKEN }}
        
    - name: Build and Test product Service
      # -pl product: Only build product project
      # -am: Also make dependencies (build common-library if needed)
      run: mvn -B clean install -pl product -am
            
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: product-test-results
        path: | 
          product/target/*-reports/*.xml
          product/target/site/jacoco/*

    - name: PR comment jacoco coverage
      id: jacoco
      uses: madrapps/jacoco-report@v1.7.2
      with:
        paths: |
          ${{ github.workspace }}/product/target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 70
        title: "product coverage"
    
    - name: add jacoco coverage to job summary
      run: |
        echo "### Code Coverage Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Overall Coverage:** ${{ steps.jacoco.outputs.coverage-overall }}%" >> $GITHUB_STEP_SUMMARY
        echo "- **Changed Files Coverage:** ${{ steps.jacoco.outputs.coverage-changed-files }}%" >> $GITHUB_STEP_SUMMARY

    - name: publish test results
      uses: mikepenz/action-junit-report@v4
      if: success() || failure()
      with:
        report_paths: product/target/*-reports/TEST-*.xml
        detailed_summary: true
        github_token: ${{ secrets.GITHUB_TOKEN }}

    - name: Cache OWASP NVD DB
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: owasp-nvd-${{ runner.os }}

    - name: Checkstyle
      run: mvn checkstyle:check -pl product -am

    - name: OWASP Dependency Check
      run: mvn org.owasp:dependency-check-maven:check -pl product -am

    - name: Upload OWASP Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: product-owasp-report
        path: product/target/dependency-check-report.html

    - name: Fail PR if overall coverage is less than 70%
      if: ${{ steps.jacoco.outputs.coverage-overall < 70.0 }}
      uses: actions/github-script@v6
      with:
        script: |
          core.setFailed('Overall coverage is less than 70%!')